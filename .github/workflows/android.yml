name: Build release APK (FOSS)
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "microsoft"
          cache: 'gradle'

      - name: Update build product flavor
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=false" >> ./gradle.properties

      - name: Update Sentry Secrets
        run: |
          echo 'SENTRY_DSN=' > ./local.properties
          echo "SENTRY_AUTH_TOKEN=" >> ./local.properties

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions || true

      - name: Build release APK
        run: ./gradlew androidApp:assembleRelease

      - name: Generate Keystore, Zipalign & Sign APK
        run: |
          # 1. On-the-fly keystore generate karega
          keytool -genkey -v -keystore release.keystore -alias simpmusic -keyalg RSA -keysize 2048 -validity 10000 -storepass android123 -keypass android123 -dname "CN=SimpMusic,O=Developer,C=IN"
          
          # 2. Build Tools aur APK Path set karega
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          APK_DIR="androidApp/build/outputs/apk/release"
          
          # ⚡ 3. YAHAN FIX KIYA HAI: Sirf arm64-v8a wala APK hi dhoondega
          TARGET_APK=$(find $APK_DIR -name "*arm64-v8a*.apk" | head -n 1)
          
          # Agar by chance arm64 split na mile, toh universal ko fallback rakha hai
          if [ -z "$TARGET_APK" ]; then
            TARGET_APK=$(find $APK_DIR -name "*universal*.apk" | head -n 1)
          fi
          
          echo "Signing exact APK: $TARGET_APK"
          
          # 4. Zipalign for Android 16 strict rules
          $BUILD_TOOLS_DIR/zipalign -v -p 4 "$TARGET_APK" $APK_DIR/aligned.apk
          
          # 5. Apksigner with V2/V3 signatures
          $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore --ks-pass pass:android123 --key-pass pass:android123 --out $APK_DIR/SimpMusic-HiBy-arm64-v8a-Signed.apk $APK_DIR/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # Naya naam tak ki download karte waqt clear rahe
          name: SimpMusic-Origin-Island-arm64
          path: androidApp/build/outputs/apk/release/SimpMusic-HiBy-arm64-v8a-Signed.apk
