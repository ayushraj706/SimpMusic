name: Build release APK (FOSS)
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'  # ⚡ Tere repo ki branch ke hisaab se update kar diya
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "microsoft"
          cache: 'gradle'

      - name: Update build product flavor
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=true" >> ./gradle.properties

      # ⚡ Sentry secrets nahi hain, toh khali rakh kar error bypass karenge
      - name: Update Sentry Secrets
        run: |
          echo 'SENTRY_DSN=' > ./local.properties
          echo "SENTRY_AUTH_TOKEN=" >> ./local.properties

      - name: Generate aboutLibraries.json
        run: ./gradlew exportLibraryDefinitions || true

      - name: Build release APK
        run: ./gradlew androidApp:assembleRelease

      # 🔐 NAYA SIGNING STEP: Bina secrets ke kaam karega!
      - name: Generate Keystore, Zipalign & Sign APK
        run: |
          # 1. On-the-fly naya official keystore generate karega
          keytool -genkey -v -keystore release.keystore -alias simpmusic -keyalg RSA -keysize 2048 -validity 10000 -storepass android123 -keypass android123 -dname "CN=SimpMusic,O=Developer,C=IN"
          
          # 2. Build Tools aur APK Path set karega
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          APK_DIR="androidApp/build/outputs/apk/release"
          
          # 3. Jo bhi unsigned APK bani hai usko dhoondega
          TARGET_APK=$(find $APK_DIR -name "*.apk" | head -n 1)
          
          echo "Signing exact APK: $TARGET_APK"
          
          # 4. Android 14/15/16 ke strict rules ke liye file ko Zipalign karega
          $BUILD_TOOLS_DIR/zipalign -v -p 4 "$TARGET_APK" $APK_DIR/aligned.apk
          
          # 5. Apksigner se 100% valid V2/V3 signature lagayega
          $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore --ks-pass pass:android123 --key-pass pass:android123 --out $APK_DIR/SimpMusic-HiBy-Signed.apk $APK_DIR/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpMusic-Origin-Island
          path: androidApp/build/outputs/apk/release/SimpMusic-HiBy-Signed.apk
